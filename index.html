<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="images/milo/IMG_0046.JPEG" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>photo albums</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --surface: #f5f0eb;
      --border: #d0ccc8;
      --purple: #9b8ab8;
      --purple-glow: rgba(155, 138, 184, 0.25);
      --text: #3d3836;
      --muted: #6b6560;
      --mod: #c9a0a0;
      --mod-glow: rgba(201, 160, 160, 0.25);
      --fun: #8ab8a8;
      --fun-glow: rgba(138, 184, 168, 0.25);
      --info: #d4c494;
      --info-glow: rgba(212, 196, 148, 0.25);
      --pink: #d4a8b4;
      --pink-glow: rgba(212, 168, 180, 0.25);
      --blue: #a0c0d8;
      --blue-glow: rgba(160, 192, 216, 0.25);
      --orange: #dcb8a0;
      --gradient-1: linear-gradient(135deg, #b8a8d0 0%, #a898c0 100%);
      --gradient-2: linear-gradient(135deg, #e0c0d0 0%, #d4b0c0 100%);
      --gradient-3: linear-gradient(135deg, #a8c8e0 0%, #98d0e0 100%);
      --gradient-4: linear-gradient(135deg, #a8d8c0 0%, #98e0d0 100%);
      --gradient-5: linear-gradient(135deg, #e0a8b8 0%, #e8d8a8 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image: 
        radial-gradient(ellipse at 10% 20%, rgba(155, 138, 184, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(138, 184, 168, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(212, 168, 180, 0.15) 0%, transparent 60%);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 100%;
      margin: 0 auto;
    }

    header {
      margin-bottom: 56px;
      animation: fadeUp 0.5s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(155, 138, 184, 0.35) 0%, rgba(212, 168, 180, 0.35) 100%);
      border: 1px solid transparent;
      border-image: linear-gradient(135deg, #9b8ab8 0%, #d4a8b4 100%) 1;
      color: var(--purple);
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 16px;
      box-shadow: 0 0 16px rgba(155, 138, 184, 0.35);
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9b8ab8 0%, #d4a8b4 100%);
      animation: pulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(155, 138, 184, 0.8);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3d3836 0%, #9b8ab8 50%, #8ab8a8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 span { 
      background: linear-gradient(135deg, #d4a8b4 0%, #d4c494 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #6b6560 0%, #a0c0d8 50%, #8ab8a8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    section {
      margin-bottom: 40px;
      animation: fadeUp 0.5s ease both;
    }

    section:nth-child(2) { animation-delay: 0.05s; }
    section:nth-child(3) { animation-delay: 0.10s; }
    section:nth-child(4) { animation-delay: 0.15s; }
    section:nth-child(5) { animation-delay: 0.20s; }
    section:nth-child(6) { animation-delay: 0.25s; }
    section:nth-child(7) { animation-delay: 0.30s; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #9b8ab8 0%, #d4a8b4 50%, #8ab8a8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #9b8ab8 20%, #d4a8b4 50%, #8ab8a8 80%, transparent 100%);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .cmd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }

    .cmd.purple { --accent: var(--purple); --glow: var(--purple-glow); }
    .cmd.red    { --accent: var(--mod);    --glow: var(--mod-glow); }
    .cmd.teal   { --accent: var(--fun);    --glow: var(--fun-glow); }
    .cmd.amber  { --accent: var(--info);   --glow: var(--info-glow); }

    .cmd:hover {
      transform: translateY(-2px);
      border-color: var(--accent, var(--purple));
      box-shadow: 0 0 16px var(--glow, var(--purple-glow));
    }

    .cmd-name {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent, var(--purple));
    }

    .cmd-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .mod-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--mod-glow);
      border: 1px solid var(--mod);
      color: var(--mod);
      padding: 1px 6px;
      border-radius: 3px;
      align-self: flex-start;
      margin-top: 2px;
    }

    footer {
      margin-top: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    footer a { color: var(--purple); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(155, 138, 184, 0.8); }
      50%       { opacity: 0.4; box-shadow: 0 0 20px rgba(155, 138, 184, 0.5); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes glow {
      0%, 100% { filter: brightness(1) saturate(1); }
      50% { filter: brightness(1.1) saturate(1.2); }
    }

    /* Album Navigation */
    .album-nav {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .random-btn {
      margin-top: 20px;
      align-self: center;
    }

    .album-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.05em;
    }

    .album-btn:hover {
      border-color: var(--purple);
      box-shadow: 0 0 20px var(--purple-glow), 0 0 40px rgba(155, 138, 184, 0.35);
      transform: translateY(-2px);
      background: linear-gradient(135deg, rgba(155, 138, 184, 0.2) 0%, rgba(212, 168, 180, 0.2) 100%);
    }

    .album-btn.active {
      background: linear-gradient(135deg, rgba(155, 138, 184, 0.35) 0%, rgba(212, 168, 180, 0.35) 100%);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 24px var(--purple-glow), inset 0 0 20px rgba(155, 138, 184, 0.2);
    }

    .random-btn {
      background: linear-gradient(135deg, rgba(212, 168, 180, 0.4) 0%, rgba(155, 138, 184, 0.4) 100%);
      border: 1px solid var(--pink);
      color: var(--pink);
      padding: 12px 24px;
      border-radius: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.05em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 16px rgba(212, 168, 180, 0.3);
    }

    .random-btn:hover {
      background: linear-gradient(135deg, rgba(212, 168, 180, 0.6) 0%, rgba(155, 138, 184, 0.6) 100%);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 30px rgba(212, 168, 180, 0.5), 0 0 50px rgba(155, 138, 184, 0.3);
      transform: translateY(-2px) scale(1.05);
    }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .photo-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeUp 0.5s ease both;
    }

    .photo-card:hover {
      transform: translateY(-4px);
      border-color: var(--purple);
      box-shadow: 
        0 8px 32px var(--purple-glow),
        0 0 0 1px rgba(155, 138, 184, 0.4),
        inset 0 0 20px rgba(155, 138, 184, 0.2);
    }

    .photo-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .photo-card:hover img {
      transform: scale(1.05);
    }

    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(61, 56, 54, 0.6));
      padding: 40px 16px 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .photo-card:hover .photo-overlay {
      opacity: 1;
    }

    .photo-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #3d3836 0%, #9b8ab8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .video-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, rgba(155, 138, 184, 0.95) 0%, rgba(212, 168, 180, 0.95) 100%);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      box-shadow: 0 2px 8px rgba(61, 56, 54, 0.2);
      z-index: 2;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      animation: fadeUp 0.5s ease both;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 14px;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(61, 56, 54, 0.85);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      animation: zoomIn 0.3s ease;
    }

    .lightbox-image {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow:
        0 0 60px rgba(155, 138, 184, 0.5),
        0 0 120px rgba(155, 138, 184, 0.35),
        0 0 0 1px rgba(155, 138, 184, 0.4);
      border: 1px solid rgba(155, 138, 184, 0.35);
    }

    .lightbox-video {
      max-width: 100%;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow:
        0 0 60px rgba(155, 138, 184, 0.5),
        0 0 120px rgba(155, 138, 184, 0.35),
        0 0 0 1px rgba(155, 138, 184, 0.4);
      border: 1px solid rgba(155, 138, 184, 0.35);
    }

    .lightbox-close {
      position: absolute;
      top: -50px;
      right: 0;
      background: linear-gradient(135deg, rgba(212, 168, 180, 0.9) 0%, rgba(155, 138, 184, 0.9) 100%);
      border: 2px solid var(--text);
      color: white;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: 0 2px 12px rgba(61, 56, 54, 0.4);
      font-weight: 700;
      line-height: 1;
    }

    .lightbox-close:hover {
      background: linear-gradient(135deg, rgba(212, 168, 180, 1) 0%, rgba(155, 138, 184, 1) 100%);
      color: white;
      box-shadow: 0 4px 20px rgba(61, 56, 54, 0.5);
      transform: scale(1.15);
    }

    .lightbox-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
    }

    .lightbox-prev,
    .lightbox-next {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: linear-gradient(135deg, #9b8ab8 0%, #d4a8b4 100%);
      border-color: transparent;
      color: var(--text);
      box-shadow: 0 0 20px rgba(155, 138, 184, 0.5);
      transform: scale(1.1);
    }

    .lightbox-info {
      margin-top: 16px;
      text-align: center;
    }

    .lightbox-info h3 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #3d3836 0%, #9b8ab8 50%, #d4a8b4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .lightbox-number {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .lightbox-close {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 44px;
        height: 44px;
        font-size: 24px;
        z-index: 10000;
        background: linear-gradient(135deg, rgba(212, 168, 180, 0.95) 0%, rgba(155, 138, 184, 0.95) 100%);
        border: 2px solid var(--text);
      }
      
      .lightbox-content {
        max-width: 95vw;
        max-height: 80vh;
      }
      
      .lightbox-image,
      .lightbox-video {
        max-height: 70vh;
      }
      
      .lightbox-info {
        margin-top: 12px;
      }
      
      .lightbox-info h3 {
        font-size: 18px;
        margin-bottom: 6px;
      }
      
      .lightbox-nav {
        gap: 15px;
        margin-top: 8px;
      }
      
      .lightbox-prev,
      .lightbox-next {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
      
      .lightbox-number {
        font-size: 12px;
      }
      
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="badge">photo album</div>
    <h1><span>memories</span></h1>
    <p class="subtitle">browse through beautiful moments &nbsp;-&nbsp; click any photo to view full size</p>
    <button class="random-btn" id="randomBtn">🎲 Random</button>
  </header>

  <!-- Album Navigation -->
  <section>
    <div class="section-label">albums</div>
    <div class="album-nav">
      <button class="album-btn active" data-album="milky">Milky</button>
      <button class="album-btn" data-album="boris">Boris</button>
      <button class="album-btn" data-album="milky_boris">Milky + Boris</button>
      <button class="album-btn" data-album="milo">Milo</button>
      <button class="album-btn" data-album="stitch">Stitch</button>
      <button class="album-btn" data-album="milo_stitch">Milo and Stitch</button>
    </div>
  </section>

  <!-- Gallery -->
  <section>
    <div class="section-label" id="albumTitle">milky's gallery</div>
    <div class="gallery-grid" id="galleryGrid">
      <!-- Photos will be loaded here dynamically -->
    </div>
    
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">?</div>
      <h3>No photos yet</h3>
      <p>This album is empty. Check back later for new photos!</p>
    </div>
  </section>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img class="lightbox-image" id="lightboxImage" src="" alt="" style="display:none;">
    <video class="lightbox-video" id="lightboxVideo" style="display:none;" controls></video>
    <div class="lightbox-info">
      <h3 id="lightboxTitle"></h3>
      <div class="lightbox-nav">
        <button class="lightbox-prev" id="lightboxPrev">&#8592;</button>
        <span class="lightbox-number" id="lightboxNumber"></span>
        <button class="lightbox-next" id="lightboxNext">&#8594;</button>
      </div>
    </div>
  </div>
</div>

  let currentAlbum = 'milky';
  let currentPhotoIndex = 0;

  // DOM Elements
  const galleryGrid = document.getElementById('galleryGrid');
  const emptyState = document.getElementById('emptyState');
  const albumTitle = document.getElementById('albumTitle');
  const lightbox = document.getElementById('lightbox');
  const lightboxImage = document.getElementById('lightboxImage');
  const lightboxVideo = document.getElementById('lightboxVideo');
  const lightboxTitle = document.getElementById('lightboxTitle');
  const lightboxNumber = document.getElementById('lightboxNumber');
  const lightboxClose = document.getElementById('lightboxClose');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');
  const albumButtons = document.querySelectorAll('.album-btn');

  // Load Album
  function loadAlbum(albumName) {
    currentAlbum = albumName;
    const photos = albums[albumName];
    
    // Update title
    albumTitle.textContent = `${albumName}'s gallery`;
    
    // Update active button
    albumButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.album === albumName);
    });
    
    // Clear gallery
    galleryGrid.innerHTML = '';
    
    // Show empty state or photos
    if (photos.length === 0) {
      emptyState.style.display = 'block';
      galleryGrid.style.display = 'none';
    } else {
      emptyState.style.display = 'none';
      galleryGrid.style.display = 'grid';
      
      // Add photos with staggered animation
      photos.forEach((photo, index) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.style.animationDelay = `${index * 0.05}s`;
        
        const mediaType = photo.type || 'image';
        let mediaElement;
        
        if (mediaType === 'video') {
          mediaElement = `
            <video src="${photo.src}" muted loop onmouseover="this.play()" onmouseout="this.pause()" style="width:100%;height:140px;object-fit:cover;display:block;"></video>
            <div class="video-indicator">▶ Video</div>
          `;
        } else {
          mediaElement = `
            <img src="https://snoovpy.github.io/online-album/${photo.src}" alt="${photo.title}">
          `;
        }
        
        card.innerHTML = `
          ${mediaElement}
          <div class="photo-overlay">
            <div class="photo-title">${photo.title}</div>
          </div>
        `;
        
        card.addEventListener('click', () => openLightbox(index));
        galleryGrid.appendChild(card);
      });
    }
  }

  // Lightbox Functions
  function openLightbox(index) {
    currentPhotoIndex = index;
    const photo = albums[currentAlbum][index];
    const mediaType = photo.type || 'image';
    
    // Hide both elements first
    lightboxImage.style.display = 'none';
    lightboxVideo.style.display = 'none';
    
    if (mediaType === 'video') {
      lightboxVideo.src = photo.src;
      lightboxVideo.style.display = 'block';
      lightboxVideo.play();
    } else {
      lightboxImage.src = 'https://snoovpy.github.io/online-album/' + photo.src;
      lightboxImage.style.display = 'block';
    }
    
    lightboxTitle.textContent = photo.title;
    lightboxNumber.textContent = `${index + 1} / ${albums[currentAlbum].length}`;
    lightbox.classList.add('active');
    
    // Prevent body scroll
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightboxVideo.pause();
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  function showPrevPhoto() {
    const photos = albums[currentAlbum];
    currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
    const photo = photos[currentPhotoIndex];
    const mediaType = photo.type || 'image';
    
    // Hide both elements first
    lightboxImage.style.display = 'none';
    lightboxVideo.style.display = 'none';
    
    if (mediaType === 'video') {
      lightboxVideo.src = photo.src;
      lightboxVideo.style.display = 'block';
      lightboxVideo.play();
    } else {
      lightboxImage.src = 'https://snoovpy.github.io/online-album/' + photo.src;
      lightboxImage.style.display = 'block';
    }
    
    lightboxTitle.textContent = photo.title;
    lightboxNumber.textContent = `${currentPhotoIndex + 1} / ${albums[currentAlbum].length}`;
  }

  function showNextPhoto() {
    const photos = albums[currentAlbum];
    currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
    const photo = photos[currentPhotoIndex];
    const mediaType = photo.type || 'image';
    
    // Hide both elements first
    lightboxImage.style.display = 'none';
    lightboxVideo.style.display = 'none';
    
    if (mediaType === 'video') {
      lightboxVideo.src = photo.src;
      lightboxVideo.style.display = 'block';
      lightboxVideo.play();
    } else {
      lightboxImage.src = 'https://snoovpy.github.io/online-album/' + photo.src;
      lightboxImage.style.display = 'block';
    }
    
    lightboxTitle.textContent = photo.title;
    lightboxNumber.textContent = `${currentPhotoIndex + 1} / ${albums[currentAlbum].length}`;
  }

  // Random button functionality
  function showRandomPhoto() {
    // Get all photos from all albums
    const allPhotos = [];
    const albumNames = Object.keys(albums);
    
    albumNames.forEach(albumName => {
      albums[albumName].forEach((photo, index) => {
        allPhotos.push({
          album: albumName,
          index: index,
          photo: photo
        });
      });
    });
    
    if (allPhotos.length === 0) return;
    
    // Select random photo
    const randomItem = allPhotos[Math.floor(Math.random() * allPhotos.length)];
    
    // Set current album and index
    currentAlbum = randomItem.album;
    currentPhotoIndex = randomItem.index;
    
    // Update active album button
    albumButtons.forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.album === randomItem.album) {
        btn.classList.add('active');
      }
    });
    
    // Load the album and show the random photo
    loadAlbum(randomItem.album);
    openLightbox(randomItem.index);
  }

  // Event Listeners
  albumButtons.forEach(btn => {
    btn.addEventListener('click', () => loadAlbum(btn.dataset.album));
  });

  document.getElementById('randomBtn').addEventListener('click', showRandomPhoto);

  lightboxClose.addEventListener('click', closeLightbox);
  lightboxPrev.addEventListener('click', showPrevPhoto);
  lightboxNext.addEventListener('click', showNextPhoto);

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  // Keyboard Navigation
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showPrevPhoto();
    if (e.key === 'ArrowRight') showNextPhoto();
  });

  // Touch/Swipe Support for Mobile
  let touchStartX = 0;
  let touchEndX = 0;

  lightbox.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  });

  lightbox.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  });

  function handleSwipe() {
    const swipeThreshold = 50;
    const diff = touchStartX - touchEndX;
    
    if (Math.abs(diff) > swipeThreshold) {
      if (diff > 0) {
        showNextPhoto();
      } else {
        showPrevPhoto();
      }
    }
  }

  // Initialize
  loadAlbum('milky');
